name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: garden
      - uses: actions/checkout@v4
        with:
          repository: orochi235/weasel
          token: ${{ secrets.WEASEL_TOKEN }}
          path: weasel
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: garden/package-lock.json
      - working-directory: garden
        run: npm ci
      - working-directory: garden
        run: npm run build
      - working-directory: garden
        run: cp layer-lab.html dist/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: garden/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
